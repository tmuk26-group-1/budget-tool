{% extends "base.html" %}

{% block content %}
<div class="container">
    <h1>Forgot Password</h1>
    <p>Enter an existing email</p>

    <form id="check-form">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Email">
        <button type="submit">Submit</button>
    </form>

    <div id="not-found" style="display: none;">
        <p>No account found with that username.</p>
        <a href="{{ url_for('register') }}">Create an account</a>
    </div>

    <div id="reset-form" style="display: none;">
        <form method="POST" action="/reset-password">
            <label for="new_password">New Password</label>
            <input type="password" id="new_password" name="new_password" placeholder="New Password" required>

            <label for="confirm_password">Confirm Password</label>
            <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm Password" required>

            <button type="submit">Update Password</button>
        </form>
    </div>
</div>

<script>
    function showNotFound() {
        document.getElementById("not-found").style.display = "block";
        document.getElementById("reset-form").style.display = "none";
    }

    function showResetForm() {
        document.getElementById("not-found").style.display = "none";
        document.getElementById("reset-form").style.display = "block";
    }

    document.getElementById("check-form").addEventListener("submit", function (e) {
        e.preventDefault();

        const email = document.getElementById("email").value;

        fetch("/check-email", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email })
        })
        .then(res => res.json())
        .then(data => {
            if (data.exists) {
                showResetForm();
            } else {
                showNotFound();
            }
        })
    });
</script>
{% endblock %}
