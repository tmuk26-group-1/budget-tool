{% extends "base.html" %}

{% block content %}
<div class="login-container">
    <div class="login-box">
        <h1>Forgot Password</h1>
        <p>Enter an existing email</p>

        <form id="check-form">
            <div class="input-group">
                <label for="email" class="visually-hidden">Email</label>
                <input type="email" id="email" name="email" placeholder="Email" required>
            </div>

            <button type="submit">Submit</button>
        </form>

        <div id="not-found" style="display: none;">
            <p>No account found with that email.</p>
            <a href="{{ url_for('register') }}">Create an account</a>
        </div>

        <div id="reset-form" style="display: none;">
            <form method="POST" action="/reset-password">
                <div class="input-group">
                <label for="new_password" class="visually-hidden">New Password</label>
                <input type="password" id="new_password" name="new_password" placeholder="New Password" required>
                </div>

                <div class="input-group">
                <label for="confirm_password" class="visually-hidden">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm Password" required>
                </div>

                <button type="submit">Update Password</button>
            </form>
        </div>
    </div>
</div>

<script>
    function showNotFound() {
        document.getElementById("not-found").style.display = "block";
        document.getElementById("reset-form").style.display = "none";
    }

    function showResetForm() {
        document.getElementById("not-found").style.display = "none";
        document.getElementById("reset-form").style.display = "block";
    }

    document.getElementById("check-form").addEventListener("submit", function (e) {
        e.preventDefault();

        const email = document.getElementById("email").value;

        fetch("/check-email", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email })
        })
        .then(res => res.json())
        .then(data => {
            if (data.exists) {
                showResetForm();
            } else {
                showNotFound();
            }
        })
        .catch(err => {
            console.error("Something went wrong:", err);
        });
    });
</script>
{% endblock %}
