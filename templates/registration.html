{% extends "base.html" %}

{% block extra_css %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/pages/registration.css') }}">
{% endblock %}

{% block content %}
    <div class="register-container">
        <div class="register-box">
        <h1>Create your account</h1>
        <p class="subtitle">Fill in your details below</p>

        <!-- Error message block -->
        {% if error %}
            <div class="error-message">
                <p style="color:red;">{{ error }}</p>
            </div>
        {% endif %}

        <!-- Registration form -->
        <form method="POST" action="{{ url_for('register') }}">
            <div class="input-group">
                <input type="email" name="email" placeholder="Email" required>
            </div>
            <div class="input-group">
                <input type="text" name="firstname" placeholder="First name" required>
            </div>
            <div class="input-group">
                <input type="text" name="lastname" placeholder="Last name" required>
            </div>
            <div class="input-group">
                <input type="text" name="username" placeholder="Username" required>
            </div>
            <div class="input-group">
                <input type="password" name="password" placeholder="Password" required>
            </div>
            
            <button type="submit" class="register-button">Register</button>
            
            <p class="login-link">Already have an account? <a href="{{ url_for('login_get') }}">Login here</a></p>
        </form>
        </div>
    </div>
{% endblock %}
