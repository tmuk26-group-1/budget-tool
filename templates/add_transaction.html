{% extends "base.html" %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/pages/add_transaction.css') }}">
{% endblock %}

{% block content %}

<div class="dashboard-container">

    {% if error %}
        <div class="error-message" style="color: red; margin-bottom: 10px;">
            {{ error }}
        </div>
    {% endif %}

    <form method="POST" action="{{ url_for('add_transaction')}}" class="transaction-form">

        <!-- Type -->
        <div class="form-group">
            <label for="type">Type</label>
            <select class="type-select" name="type" id="type" required>
                <option value="" disabled selected>Select type</option>
                <option value="income">Income</option>
                <option value="expense">Expense</option>
            </select>
        </div>

        <!-- Category -->
        <div class="form-group">
            <label for="category">Category</label>
            <select class="type-select" name="category_id" id="category" required>
                <option value="" disabled selected>Select category</option>
                {% for c in categories %}
                    <option value="{{ c.category_id }}">{{ c.name }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- Amount -->
        <div class="form-group">
            <label for="amount">Amount (SEK)</label>
            <input type="number" name="amount" id="amount" placeholder="e.g. 1000" required>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn btn-submit">Add Transaction</button>
    </form>
</div>

{% endblock %}
