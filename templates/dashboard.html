{% extends "base.html" %}

{% block extra_css %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/pages/dashboard.css') }}">
{% endblock %}

{% block content %}
    <div class="dashboard-container">
        <header class="budget-hero">
            <h2>Kvarstående Budget</h2>
            <h1 class="budget-amount">24 500 kr</h1>
        </header>

        <div class="action-buttons">
            <button class="btn btn-income">+ Lägg till inkomst</button>
            <button class="btn btn-expense">- Lägg till utgift</button>
        </div>

        <div class="transaction-form">
            <h3>Ny Transaktion</h3>
            
            <div class="form-group">
                <label for="category">Kategori</label>
                <select id="category" name="category">
                    <option value="" disabled selected>Välj kategori...</option>
                    <option value="salary">Lön</option>
                    <option value="food">Mat & Livsmedel</option>
                    <option value="rent">Hyra & Boende</option>
                    <option value="entertainment">Nöje</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="description">Beskrivning / Kommentar</label>
                <input type="text" id="description" placeholder="T.ex. ICA Maxi eller Månadslön">
            </div>

            <button class="btn btn-submit">OK</button>
        </div>
    </div>
</body>
</html>
{% endblock %}
