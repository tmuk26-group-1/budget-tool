{% extends "base.html" %}

{% block content %}

<div class="login-container">

    <form class="login-box">
        <h1>Login</h1>

        <div class="input-group">
            <input type="email" placeholder="Email" required>
        </div>

        <div class="input-group">
            <input type="password" placeholder="Password" required>
        </div>
    </form>
</div>

{% endblock %}
