{% extends "base.html" %}

{% block extra_css %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/pages/login.css') }}">
{% endblock %}

{% block content %}
    
        <div class="login-container">
        <form class="login-box" method="POST" action="/login">
        <img src="{{ url_for('static', filename='images/grr.png') }}" alt="Vårt projekts snygga logotyp">
        <h1>Login</h1>

        <!-- Error message block -->
        {% if error %}
            <div class="error-message">
                <p style="color:red;">{{ error }}</p>
            </div>
        {% endif %}

        <div class="input-group">
            <input type="email" name="email" placeholder="Email" required>
        </div>

        <div class="input-group">
            <input type="password" name="password" placeholder="Password" required>
        </div>

        <div class="option-group">
            <label>
                <input type="checkbox"> remember me
            </label>
            <a href="{{ url_for('forgot_password') }}">forgot password?</a>
        </div>

        <button type="submit" class="login-button">Login</button>

        <p class="register-text">Don't have an account?
            <a href="{{ url_for('register_get') }}">Register</a>
        </p>
    </form>
</div>
{% endblock %}
