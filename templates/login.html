{% extends "base.html" %}
 
{% block content %}
    
        <div class="login-container">
        <!-- lagt till method="POST" for att login ska kunna SKICKA data -->
        <!-- lagt till action="/login" för att login ska vet VART den ska skicka datan -->
        <img src="grr.png" alt="Vårt projekts snygga logotyp">
        <form class="login-box" method="POST" action="/login">
        <h1>Login</h1>

        <div class="input-group">
            <input type="email" name="email" placeholder="Email" required>
        </div>

        <div class="input-group">
            <input type="password" name="password" placeholder="Password" required>
        </div>

        <div class="option-group">
            <label>
                <input type="checkbox"> remember me
            </label>
            <a href="#">forgot password?</a>
        </div>

        <button type="submit" class="login-button">Login</button>

        <p class="register-text">Don't have an account?
            <a href="{{ url_for('register_get') }}">Register</a>
        </p>
    </form>
</div>
{% endblock %}
